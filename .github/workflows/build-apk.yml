name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build Android Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare Android Secrets and Keystore
        run: |
          # Copy .env.example to .env to satisfy the Secrets Gradle Plugin
          if [ -f .env.example ]; then
            echo "Copying .env.example to .env"
            cp .env.example .env
          else
            echo "Creating a dummy .env file"
            echo "GEMINI_API_KEY=dummy_key" > .env
          fi

          # Reconstruct the debug.keystore from the base64 backup in the project root
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore from base64 backup..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 backup found. Generating a generic debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate and Configure Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper scripts are missing from repository. Generating now..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
